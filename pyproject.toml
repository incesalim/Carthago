[tool.ruff]
target-version = "py312"
# JS app, data, and vendored dirs aren't Python we lint.
extend-exclude = ["web", "data", ".venv"]

[tool.ruff.lint]
# Start conservative: catch real breakage (syntax + undefined names) so CI is
# green on the existing code. Tighten over time (add E, I, UP, B, …).
select = ["E9", "F63", "F7", "F82", "F821"]

[tool.pytest.ini_options]
pythonpath = ["scripts", "."]
testpaths = ["tests"]
addopts = "-q"
