name: Refresh BDDK bulletins

# Isolated BDDK-only refresh: monthly + weekly bulletins.
# Excludes EVDS (see refresh-evds-daily.yml) and audit-report PDFs
# (see refresh-data.yml). All three workflows share the R2 snapshot,
# so they serialize via the `bddk-pipeline` concurrency group.
#
# When to run:
#   - Saturday 02:00 UTC (05:00 Turkey): BDDK publishes weekly data
#     Friday evenings; this catches the new week before the broader
#     refresh-data.yml runs at 03:00 UTC.
#   - Manually from the Actions tab.
on:
  schedule:
    - cron: "0 2 * * 6"
  workflow_dispatch:
    inputs:
      skip_monthly:
        description: "Skip monthly bulletin update"
        type: boolean
        default: false
      skip_weekly:
        description: "Skip weekly bulletin update"
        type: boolean
        default: false

# Read-only — the SQLite snapshot lives in R2, not git.
permissions:
  contents: read

# Serialize with refresh-evds-daily.yml and refresh-data.yml so they
# can't race on the R2 snapshot. cancel-in-progress: false → late
# runs queue instead of dropping data.
concurrency:
  group: bddk-pipeline
  cancel-in-progress: false

jobs:
  refresh:
    name: BDDK bulletins → SQLite → D1
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch SQLite snapshot from R2 + decompress
        run: |
          python - <<'PY'
          import gzip, shutil, pathlib
          from src.audit_reports import r2_storage
          gz = pathlib.Path("data/bddk_data.db.gz")
          db = pathlib.Path("data/bddk_data.db")
          gz.parent.mkdir(parents=True, exist_ok=True)
          if r2_storage.exists("state/bddk_data.db.gz"):
              size = r2_storage.download_to("state/bddk_data.db.gz", gz)
              print(f"Pulled state/bddk_data.db.gz from R2 ({size/1e6:.1f} MB)")
              with gzip.open(gz, "rb") as s, open(db, "wb") as d:
                  shutil.copyfileobj(s, d)
              print(f"Decompressed to {db.stat().st_size/1e6:.1f} MB")
          else:
              print("No snapshot in R2 yet — starting from empty DB.")
          PY

      - name: Refresh BDDK bulletins (skip EVDS, no audit-report sync)
        # refresh.py orchestrates: monthly → weekly → VACUUM → gzip.
        # --skip-evds keeps this workflow strictly BDDK-only.
        env:
          SKIP_MONTHLY: ${{ inputs.skip_monthly && '--skip-monthly' || '' }}
          SKIP_WEEKLY: ${{ inputs.skip_weekly && '--skip-weekly' || '' }}
        run: python scripts/refresh.py --skip-evds $SKIP_MONTHLY $SKIP_WEEKLY

      - name: Setup Node (for wrangler)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Push fresh BDDK rows to Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # 30h window — covers weekday dispatch runs with a safety margin.
        # On Saturdays the 168h window in refresh-data.yml re-covers anything
        # missed earlier in the week. INSERT OR REPLACE is idempotent so
        # overlap between the two workflows is harmless.
        run: python scripts/push_to_d1.py --hours 30

      - name: Upload new SQLite snapshot back to R2
        run: |
          python - <<'PY'
          from src.audit_reports import r2_storage
          import pathlib
          gz = pathlib.Path("data/bddk_data.db.gz")
          size = r2_storage.upload_file(gz, "state/bddk_data.db.gz")
          print(f"Uploaded {size/1e6:.1f} MB to R2 state/bddk_data.db.gz")
          PY

      - name: Alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: python scripts/notify.py "❌ ${{ github.workflow }} failed — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
