name: CI

# Quality gates on every PR (and master push). Free: public-repo Actions.
on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  python:
    name: Python — ruff + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install lint/test tools
        # lxml + requests: the only runtime deps imported by the pure-logic
        # unit tests (e.g. tests/test_press_news.py imports src/news/sources/
        # press.py). Kept minimal — not the full requirements.txt (selenium/
        # pandas/pdfplumber) so the lint+test job stays fast.
        run: pip install ruff pytest lxml requests
      - name: Ruff (lint)
        run: ruff check .
      - name: Pipeline graph sync
        # /pipeline topology (web/app/lib/pipeline-graph.ts) must reference every
        # .github/workflows/*.yml and vice versa. Stdlib-only, no extra deps.
        run: python scripts/check_pipeline_graph_sync.py
      - name: Docs sync
        # docs/OPERATIONS.md must name every workflow and every secrets./vars. a
        # workflow reads; every CloudflareEnv key must be documented somewhere.
        # An undocumented secret is a lane that dies silently on re-provision.
        # Stdlib-only (regexes the YAML as text — no PyYAML in this job).
        run: python scripts/check_docs_sync.py
      - name: Schema naming
        # New D1 migrations (>= 0022) must follow docs/SCHEMA_CONVENTIONS.md
        # (bank_ticker/amount_fc/snake_case/no reserved words/unique number).
        # Stdlib-only. Existing tables are grandfathered.
        run: python scripts/check_schema_naming.py
      - name: Prose claims
        # A sentence asserting a direction, a level or a ranking must be computed
        # from the series it sits next to — or it lies the moment the data turns.
        # WARN-ONLY until the 41 sites the 2026-07 audit found are computed; then
        # drop --warn and it gates. Stdlib-only.
        run: python scripts/check_prose_claims.py --warn
      - name: Pytest
        run: pytest

  web:
    name: Web — eslint + tsc + vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Type-check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm run test
