name: CI

# Quality gates on every PR (and master push). Free: public-repo Actions.
on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  python:
    name: Python — ruff + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install lint/test tools
        # Still not the full requirements.txt — selenium/boto3/sqlalchemy back
        # lanes with no unit tests, and installing them only slows the job down.
        #
        # But pymupdf (fitz) + pandas are NOT optional: 13 test files
        # pytest.importorskip on them, so without them CI silently skipped every
        # extractor test — the largest subsystem in the repo — and reported green.
        # (Measured: 308 passed / 13 skipped without them; 394 passed / 0 skipped
        # with them. 86 tests had never run in CI.) None of those tests opens a
        # real PDF or touches the network — they build synthetic rows in-process —
        # and both ship prebuilt wheels, so the job stays fast. The extractors are
        # fitz-only (pdfplumber removed 2026-07-15).
        run: pip install ruff pytest lxml requests pymupdf pandas
      - name: Ruff (lint)
        run: ruff check .
      - name: Pipeline graph sync
        # /pipeline topology (web/app/lib/pipeline-graph.ts) must reference every
        # .github/workflows/*.yml and vice versa. Stdlib-only, no extra deps.
        run: python scripts/check_pipeline_graph_sync.py
      - name: Docs sync
        # docs/OPERATIONS.md must name every workflow and every secrets./vars. a
        # workflow reads; every CloudflareEnv key must be documented somewhere.
        # An undocumented secret is a lane that dies silently on re-provision.
        # Stdlib-only (regexes the YAML as text — no PyYAML in this job).
        run: python scripts/check_docs_sync.py
      - name: Schema naming
        # New D1 migrations (>= 0022) must follow docs/SCHEMA_CONVENTIONS.md
        # (bank_ticker/amount_fc/snake_case/no reserved words/unique number).
        # Stdlib-only. Existing tables are grandfathered.
        run: python scripts/check_schema_naming.py
      - name: Calendar freshness
        # The Ahead blocks are derived, except TCMB's MPC dates — nothing scrapes
        # that calendar, so it is transcribed by hand in web/app/lib/ahead.ts.
        # Fails once it has under 90 days of runway, so it cannot run out the way
        # the hand-typed schedules did. Also ages out the BBVA baseline.
        run: python scripts/check_calendar_fresh.py
      - name: Prose claims
        # A sentence asserting a direction, a level or a ranking must be computed
        # from the series it sits next to — or it lies the moment the data turns.
        # Catches a hardcoded sign, an asserting title= literal, a hardcoded bank
        # count. Escape hatch: `prose-ok: <reason>` (none in force today).
        # Stdlib-only.
        run: python scripts/check_prose_claims.py
      - name: Pytest
        run: pytest

  web:
    name: Web — eslint + tsc + vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Type-check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm run test
