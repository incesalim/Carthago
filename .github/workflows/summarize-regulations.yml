name: Summarize regulations (weekly)

# When to run:
#   - Every Sunday at 06:00 UTC (09:00 Turkey). Sits AFTER:
#     • Saturday 03:00 — refresh-data.yml (monthly + weekly + audit + EVDS)
#     • Sun 05:00 — refresh-evds-daily.yml (Sun is in 0-5 range)
#     • Sun 04:00 — refresh-news-daily.yml
#     so the snapshot already has all the week's fresh TCMB/BDDK bodies.
#   - Manually from the Actions tab (e.g. after adjusting the prompt).
on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      # The annual grounding pin. TCMB publishes "Monetary Policy for YYYY" in
      # late December and it is in no scrapable feed, so it is set by hand once
      # a year — dispatch this workflow with the PDF URL. It has to run HERE
      # rather than locally because the briefing reads the R2 snapshot, and only
      # this workflow pulls that snapshot and uploads it back; a local ingest
      # writes a DB nothing in production ever reads. That trap is why the
      # baseline was never populated between 2026-05-29 and 2026-07-19.
      # Idempotent: re-running with the same PDF is a content-hash no-op.
      baseline_url:
        description: "Annual pin — URL of the TCMB 'Monetary Policy for YYYY' PDF. Leave blank for a normal run."
        required: false
        default: ""
      baseline_year:
        description: "Policy year that PDF covers (e.g. 2026). Required with baseline_url."
        required: false
        default: ""

permissions:
  contents: read

# Share the snapshot lock with the other pipeline workflows so concurrent
# manual dispatches can't trample each other's R2 snapshot.
concurrency:
  group: bddk-pipeline
  cancel-in-progress: false

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch SQLite snapshot from R2 + decompress
        run: |
          python - <<'PY'
          import gzip, shutil, pathlib
          from src.audit_reports import r2_storage
          gz, db = pathlib.Path("data/bddk_data.db.gz"), pathlib.Path("data/bddk_data.db")
          gz.parent.mkdir(parents=True, exist_ok=True)
          if r2_storage.exists("state/bddk_data.db.gz"):
              size = r2_storage.download_to("state/bddk_data.db.gz", gz)
              print(f"Pulled state/bddk_data.db.gz from R2 ({size/1e6:.1f} MB)")
              with gzip.open(gz, "rb") as s, open(db, "wb") as d:
                  shutil.copyfileobj(s, d)
              print(f"Decompressed to {db.stat().st_size/1e6:.1f} MB")
          else:
              raise SystemExit("No R2 snapshot found — cannot summarize from empty DB.")
          PY

      # Annual pin, only when dispatched with a URL. Runs after the snapshot is
      # pulled and before the briefing, so the same run both stores the baseline
      # and grounds on it; the upload step at the end persists it for every
      # later run.
      - name: Ingest annual policy baseline (dispatch only)
        if: inputs.baseline_url != ''
        run: |
          python scripts/ingest_policy_baseline.py \
            --year "${{ inputs.baseline_year }}" \
            --url "${{ inputs.baseline_url }}"
          python scripts/ingest_policy_baseline.py --list

      - name: Generate weekly briefing via Kimi
        env:
          # Repo secret is named KIMI_API_TOKEN; Python code reads KIMI_API_KEY.
          KIMI_API_KEY: ${{ secrets.KIMI_API_TOKEN }}
        # --require-baseline: refuse to ship an ungrounded briefing. It reads
        # plausibly without the baseline, so a warning was not enough — this ran
        # degraded for seven weeks unnoticed.
        run: python scripts/summarize_regulations.py --require-baseline

      - name: Setup Node (for wrangler)
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Push briefing to Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # 2h window — the briefing was just inserted so fetched_at is fresh.
        run: python scripts/push_to_d1.py --hours 2

      - name: Re-gzip + upload snapshot back to R2
        run: |
          python - <<'PY'
          import gzip, shutil, pathlib
          from src.audit_reports import r2_storage
          gz, db = pathlib.Path("data/bddk_data.db.gz"), pathlib.Path("data/bddk_data.db")
          with open(db, "rb") as src, gzip.open(gz, "wb", compresslevel=9) as dst:
              shutil.copyfileobj(src, dst)
          size = r2_storage.upload_file(gz, "state/bddk_data.db.gz")
          print(f"Uploaded {size/1e6:.1f} MB to R2 state/bddk_data.db.gz")
          PY

      # This workflow had no failure alert at all, which is the other half of why
      # the missing baseline went unnoticed: nothing here ever spoke up.
      - name: Alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: python scripts/notify.py "❌ ${{ github.workflow }} failed — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
