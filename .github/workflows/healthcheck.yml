name: Health check (data freshness)

# Daily freshness/health check. Queries D1 for the latest ingest time per source
# and the audit extraction-failure count, and alerts (Telegram/Discord) when a
# source is stale or extractions are failing. Also verifies the reproduced charts
# in web/app/lib/chart-specs.catalog.json still resolve + match their anchors
# (catches silent 0-row breakage). Free: public-repo Actions + read-only D1 queries.
on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily, after the EVDS daily refresh (05:00)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node (for wrangler)
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # requests + certifi for the monthly BDDK publication probe (the check that
      # replaced the age/estimate heuristic); the rest of the check is stdlib.
      - name: Install probe deps
        run: pip install requests certifi

      - name: Run health check
        run: python scripts/healthcheck.py

      - name: Verify reproduced charts
        if: always()
        run: python scripts/verify_chart_spec.py --alert

      # Telegram keeps pushing to whatever URL it was last given, so the bot can
      # go silent with no error on our side (e.g. a Worker rename moves the
      # workers.dev hostname). Alert-only: never fails the run.
      - name: Verify Telegram webhook target
        if: always()
        continue-on-error: true
        run: python scripts/setup_telegram_webhook.py check --alert

      # The public API depends on a Cloudflare Configuration Rule that exempts
      # /api/v1 from the Browser Integrity Check. That rule lives in zone config
      # this repo can't see, and it fails INVISIBLY — curl/requests/browsers are
      # never blocked, so an ordinary smoke test stays green while stdlib-urllib
      # and pandas.read_csv callers get 403s. The probe deliberately sends the
      # blocked user agent; see the module docstring before changing it.
      - name: Verify public API (/api/v1)
        if: always()
        continue-on-error: true
        run: python scripts/check_public_api.py --alert

      # The bot's schema prompt asserts dozens of facts about the data — units,
      # enum values, which recipe finds which figure. When one drifts the model
      # writes confident, VALID, wrong SQL and nothing errors: that is how the
      # sector came back 3.84x too large and a profit ranking lost 2 of 38 banks.
      # Prose can't be unit-tested; the facts it asserts can.
      - name: Verify the bot's schema prompt matches the data
        if: always()
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/check_bot_schema.py --alert

      # Bodies are fetched once and never revisited, so an improvement to the
      # extractor never heals history — that is how the regulation briefing lost
      # the loan-growth caps for two months without anything failing. Samples the
      # newest items and alerts when a live page yields materially more than we
      # hold. Reads D1 (no snapshot in this job) and never writes a body.
      - name: Verify stored news bodies are current
        if: always()
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/check_body_freshness.py --d1 --limit 20 --alert
