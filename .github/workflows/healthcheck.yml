name: Health check (data freshness)

# Daily freshness/health check. Queries D1 for the latest ingest time per source
# and the audit extraction-failure count, and alerts (Telegram/Discord) when a
# source is stale or extractions are failing. Free: public-repo Actions + a
# single read-only D1 query.
on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily, after the EVDS daily refresh (05:00)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node (for wrangler)
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run health check
        run: python scripts/healthcheck.py
