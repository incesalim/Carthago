name: Deploy Cloudflare Workers dashboard

# Deploys the Next.js dashboard in web/ to Cloudflare Workers via OpenNext
# whenever the web/ folder (or this workflow) changes on master.
# Manually triggerable from the Actions tab.

on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - ".github/workflows/deploy-cloudflare.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with OpenNext
        run: npx opennextjs-cloudflare build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx opennextjs-cloudflare deploy
