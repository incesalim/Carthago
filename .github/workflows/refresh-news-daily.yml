name: Refresh news (daily)

# When to run:
#   - Every day at 04:00 UTC (07:00 Turkey). Sits between the daily EVDS
#     job (05:00 UTC, Sun-Fri) and the Saturday full refresh (03:00 UTC).
#     Runs all 7 days because news is the source most affected by lag.
#   - Manually from the Actions tab.
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      # One-off maintenance: bodies are fetched once and never revisited, so an
      # improvement to fetch_body never heals history. Table extraction landed
      # 2026-05-29 and every earlier TCMB row kept a table-less body until this
      # was run. Guarded by update_body's shrink check; a backup of every body
      # goes to R2 first.
      refresh_bodies:
        description: "Re-fetch body_text for ALL rows of the chosen source (default: only missing ones)"
        type: boolean
        required: false
        default: false
      body_source:
        description: "Which source to refresh: tcmb, bddk, or both"
        type: choice
        options: [tcmb, bddk, both]
        required: false
        default: tcmb

permissions:
  contents: read

# Share the snapshot lock with the other pipeline workflows so the
# four jobs (refresh-data, refresh-evds-daily, refresh-news-daily, +
# any manual dispatch) can never write to R2's snapshot concurrently.
concurrency:
  group: bddk-pipeline
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch SQLite snapshot from R2 + decompress
        run: |
          python - <<'PY'
          import gzip, shutil, pathlib
          from src.audit_reports import r2_storage
          gz, db = pathlib.Path("data/bddk_data.db.gz"), pathlib.Path("data/bddk_data.db")
          gz.parent.mkdir(parents=True, exist_ok=True)
          if r2_storage.exists("state/bddk_data.db.gz"):
              size = r2_storage.download_to("state/bddk_data.db.gz", gz)
              print(f"Pulled state/bddk_data.db.gz from R2 ({size/1e6:.1f} MB)")
              with gzip.open(gz, "rb") as s, open(db, "wb") as d:
                  shutil.copyfileobj(s, d)
              print(f"Decompressed to {db.stat().st_size/1e6:.1f} MB")
          else:
              print("No snapshot in R2 yet — starting from empty DB.")
          PY

      # Insurance on the one destructive step in this workflow. Bodies are only
      # recoverable by re-fetching from the source we would just have misread, so
      # snapshot every one to R2 before overwriting any.
      - name: Back up news bodies to R2 (refresh only)
        if: inputs.refresh_bodies
        run: |
          python - <<'PY'
          import json, gzip, sqlite3, pathlib, datetime
          from src.audit_reports import r2_storage
          rows = sqlite3.connect("data/bddk_data.db").execute(
              "SELECT source, external_id, body_text FROM news_items "
              "WHERE body_text IS NOT NULL").fetchall()
          stamp = datetime.datetime.now(datetime.timezone.utc).strftime("%Y%m%dT%H%M%SZ")
          p = pathlib.Path(f"data/news_bodies_backup_{stamp}.json.gz")
          with gzip.open(p, "wt", encoding="utf-8") as fh:
              json.dump([{"source": s, "external_id": e, "body_text": b}
                         for s, e, b in rows], fh, ensure_ascii=False)
          key = f"backups/{p.name}"
          size = r2_storage.upload_file(p, key)
          print(f"Backed up {len(rows)} bodies -> R2 {key} ({size/1e6:.2f} MB)")
          PY

      - name: Sync news (KAP + TCMB + BDDK + press + Google News)
        run: |
          if [ "${{ inputs.refresh_bodies }}" = "true" ]; then
            SRC='${{ inputs.body_source }}'
            EXTRA=""
            if [ "$SRC" != "both" ]; then EXTRA="--${SRC}-only"; fi
            echo "== refreshing bodies (source=$SRC) =="
            python scripts/sync_news.py --refresh-bodies $EXTRA
          else
            python scripts/sync_news.py
          fi

      - name: Setup Node (for wrangler)
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Push news_items to Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # 30h window covers daily cadence with a 6h safety margin.
        # news_items is idempotent on (source, external_id) so re-pushes are safe.
        run: python scripts/push_to_d1.py --hours 30

      - name: Re-gzip + upload snapshot back to R2
        run: |
          python - <<'PY'
          import gzip, shutil, pathlib
          from src.audit_reports import r2_storage
          gz, db = pathlib.Path("data/bddk_data.db.gz"), pathlib.Path("data/bddk_data.db")
          with open(db, "rb") as src, gzip.open(gz, "wb", compresslevel=9) as dst:
              shutil.copyfileobj(src, dst)
          size = r2_storage.upload_file(gz, "state/bddk_data.db.gz")
          print(f"Uploaded {size/1e6:.1f} MB to R2 state/bddk_data.db.gz")
          PY
