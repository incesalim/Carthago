name: Generate "The Read" headlines (weekly)

# Rewrites each tab's one-sentence editorial lead with a free model (Cerebras
# gpt-oss-120b → Groq → gemma), number-validated, and upserts read_headlines in
# D1. Runs AFTER the data + regulations refreshes so it rewrites current numbers:
#   • Sat 03:00 — refresh-data.yml   • Sun 06:00 — summarize-regulations.yml
# Sunday 07:30 UTC. Also manually dispatchable (e.g. after a prompt tweak).
on:
  schedule:
    - cron: "30 7 * * 0"
  workflow_dispatch:
    inputs:
      force:
        description: "Regenerate all tabs even if their numbers are unchanged"
        type: boolean
        default: false

permissions:
  contents: read

# Share the pipeline lock so a manual run can't collide with a refresh mid-write.
concurrency:
  group: bddk-pipeline
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CEREBRAS_KEY: ${{ secrets.CEREBRAS_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SITE_URL: ${{ vars.SITE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install requests
        run: pip install requests

      - name: Setup Node (for wrangler)
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Generate + upsert read headlines
        run: python scripts/generate_read_headlines.py ${{ github.event.inputs.force == 'true' && '--force' || '' }}
