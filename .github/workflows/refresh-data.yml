name: Refresh BDDK data

# When to run:
#   - Every Saturday 06:00 Turkey time (03:00 UTC) — BDDK publishes
#     weekly data Fridays, monthly bulletins land sporadically.
#   - Manually from the Actions tab (workflow_dispatch).
on:
  schedule:
    - cron: "0 3 * * 6"
  workflow_dispatch: {}

# Read-only — snapshot now lives in R2 (state/bddk_data.db.gz),
# not in git. No `contents: write` needed.
permissions:
  contents: read

# Serialize against the daily EVDS workflow so they can't race on the R2 snapshot.
concurrency:
  group: bddk-pipeline
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch SQLite snapshot from R2 + decompress
        run: |
          python - <<'PY'
          import gzip, shutil, pathlib
          from src.audit_reports import r2_storage
          gz  = pathlib.Path("data/bddk_data.db.gz")
          db  = pathlib.Path("data/bddk_data.db")
          gz.parent.mkdir(parents=True, exist_ok=True)
          if r2_storage.exists("state/bddk_data.db.gz"):
              size = r2_storage.download_to("state/bddk_data.db.gz", gz)
              print(f"Pulled state/bddk_data.db.gz from R2 ({size/1e6:.1f} MB)")
              with gzip.open(gz, "rb") as s, open(db, "wb") as d:
                  shutil.copyfileobj(s, d)
              print(f"Decompressed to {db.stat().st_size/1e6:.1f} MB")
          else:
              print("No snapshot in R2 yet — starting from empty DB.")
          PY

      - name: Run refresh (monthly + weekly + EVDS + TBB digital + vacuum + gzip)
        env:
          EVDS_API_KEY: ${{ secrets.EVDS_API_KEY }}
        run: python scripts/refresh.py

      # NOTE: audit-report sync + bank_audit_stages rebuild moved to the
      # standalone refresh-audit.yml workflow (own DB data/bank_audit.db, own
      # R2 snapshot state/bank_audit.db.gz, own concurrency group). This job
      # owns only the BDDK bulletin + EVDS tables now. The bank_audit_* tables
      # still present in this snapshot are frozen (never re-extracted here), so
      # the push below picks up no fresh audit rows — its time window finds none.

      - name: Setup Node (for wrangler)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Push incremental rows to Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # 168h (7 days) window — covers the weekly cron interval. Idempotent
        # via INSERT OR REPLACE; re-running overwrites unchanged rows safely.
        # Covers monthly / weekly / EVDS tables. The bank_audit_* tables are
        # now owned by refresh-audit.yml (separate DB + snapshot); they sit
        # frozen in this snapshot, so the time-window filter pushes none.
        run: python scripts/push_to_d1.py --hours 168

      - name: Upload new SQLite snapshot back to R2 (+ dated backup)
        run: |
          python - <<'PY'
          import pathlib
          from datetime import datetime, timezone
          from src.audit_reports import r2_storage
          gz = pathlib.Path("data/bddk_data.db.gz")
          size = r2_storage.upload_file(gz, "state/bddk_data.db.gz")
          print(f"Uploaded {size/1e6:.1f} MB to R2 state/bddk_data.db.gz")
          # Dated backup so a bad run can't destroy the only copy (keep last 7).
          date_str = datetime.now(timezone.utc).strftime("%Y%m%d")
          hkey = r2_storage.upload_history(gz, "bddk_data", date_str, keep=7)
          print(f"Backup → {hkey} (history pruned to last 7)")
          PY

      - name: Alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: python scripts/notify.py "❌ ${{ github.workflow }} failed — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
