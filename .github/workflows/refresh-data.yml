name: Refresh BDDK data

# When to run:
#   - Every Saturday 06:00 Turkey time (03:00 UTC) — BDDK publishes
#     weekly data Fridays, monthly bulletins land sporadically.
#   - Manually from the Actions tab (workflow_dispatch).
on:
  schedule:
    - cron: "0 3 * * 6"
  workflow_dispatch: {}

# Read-only — snapshot now lives in R2 (state/bddk_data.db.gz),
# not in git. No `contents: write` needed.
permissions:
  contents: read

# Serialize against the daily EVDS workflow so they can't race on the R2 snapshot.
concurrency:
  group: bddk-pipeline
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch SQLite snapshot from R2 + decompress
        run: |
          python - <<'PY'
          import gzip, shutil, pathlib
          from src.audit_reports import r2_storage
          gz  = pathlib.Path("data/bddk_data.db.gz")
          db  = pathlib.Path("data/bddk_data.db")
          gz.parent.mkdir(parents=True, exist_ok=True)
          if r2_storage.exists("state/bddk_data.db.gz"):
              size = r2_storage.download_to("state/bddk_data.db.gz", gz)
              print(f"Pulled state/bddk_data.db.gz from R2 ({size/1e6:.1f} MB)")
              with gzip.open(gz, "rb") as s, open(db, "wb") as d:
                  shutil.copyfileobj(s, d)
              print(f"Decompressed to {db.stat().st_size/1e6:.1f} MB")
          else:
              print("No snapshot in R2 yet — starting from empty DB.")
          PY

      - name: Run refresh (monthly + weekly + EVDS + vacuum + gzip)
        env:
          EVDS_API_KEY: ${{ secrets.EVDS_API_KEY }}
        run: python scripts/refresh.py

      - name: Sync audit reports (scrape new PDFs → R2 → extract → local DB)
        # Idempotent: skips PDFs already in R2 and (ticker,period,kind) already
        # extracted with success=1. New audit reports get picked up automatically
        # the week after a bank publishes.
        run: python scripts/sync_audit_reports.py --workers 16

      - name: Rebuild bank_audit_stages from credit-quality
        # bank_audit_stages is a DERIVED table (the dashboard reads it for the
        # Stage 1/2/3 view). sync_audit_reports only writes bank_audit_credit_quality;
        # this rebuilds the consolidated stage rows so push_to_d1 has fresh rows
        # to send. Without this step a new quarter's credit-quality lands in D1
        # but the stage view never updates.
        run: python scripts/build_bank_audit_stages.py

      - name: Setup Node (for wrangler)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Push incremental rows to Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # 168h (7 days) window — covers the weekly cron interval. Idempotent
        # via INSERT OR REPLACE; re-running overwrites unchanged rows safely.
        # Covers monthly / weekly / EVDS / bank_audit_* tables.
        run: python scripts/push_to_d1.py --hours 168

      - name: Upload new SQLite snapshot back to R2
        run: |
          python - <<'PY'
          from src.audit_reports import r2_storage
          import pathlib
          gz = pathlib.Path("data/bddk_data.db.gz")
          size = r2_storage.upload_file(gz, "state/bddk_data.db.gz")
          print(f"Uploaded {size/1e6:.1f} MB to R2 state/bddk_data.db.gz")
          PY
