name: Test OpenRouter key (scratch)

# Manual probe for the OPEN_ROUTER_API secret. Secrets are CI-only (never
# local), so this is the only way to test the key.
#
#   task=smoke       auth + credits + DeepSeek price list + one number-validated
#                    completion on the "The Read" prompt (default)
#   task=usage       accounting only — key + credits. Spends nothing.
#   task=regulation  the REAL weekly regulation task (scripts/summarize_regulations.py)
#                    run against OpenRouter, with a Kimi A/B on the same section
#
# The regulation mode needs NO code changes: src/news/kimi.py is an
# OpenAI-compatible client already parameterized by KIMI_API_URL / KIMI_MODEL /
# KIMI_API_KEY, so pointing those three at OpenRouter swaps the provider while
# keeping the production prompt, context builder, retries and guards identical.
# That is the whole point — a bench with its own prompt would measure the bench.
#
# READ-ONLY on production: it pulls the R2 snapshot but never uploads one, and
# never runs push_to_d1.py. The briefing it generates lands only in the runner's
# ephemeral SQLite. Hence no `bddk-pipeline` concurrency group — nothing to lock.
#
# Scratch lane — delete this workflow and scripts/scratch_test_openrouter.py
# once the OpenRouter question is settled.
on:
  workflow_dispatch:
    inputs:
      task:
        description: "Which probe to run"
        type: choice
        options: [smoke, usage, regulation]
        default: smoke
      model_id:
        description: "Model to test (default: auto-pick cheapest paid deepseek / v4-pro for regulation)"
        required: false
        default: ""
      category:
        # Sentinel rather than "" — `gh workflow run -f category=` sends an empty
        # value, which GitHub replaces with this default, so blank silently meant
        # "one section" and quietly benched the wrong thing.
        description: "regulation only — section name, or ALL for the full five-section weekly run"
        required: false
        default: "Monetary Policy Stance"
      kimi_baseline:
        description: "regulation only — also run the same section on the incumbent (Kimi) for A/B"
        type: boolean
        required: false
        default: true
      telegram:
        description: "regulation only — also post the bench output to Telegram (labelled as a bench)"
        type: boolean
        required: false
        default: false
      provider:
        description: "regulation only — pin the OpenRouter upstream (e.g. Baidu). Blank = unpinned routing."
        required: false
        default: "Baidu"

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPEN_ROUTER_API: ${{ secrets.OPEN_ROUTER_API }}
      MODEL_ID: ${{ inputs.model_id }}
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps (smoke/usage)
        if: inputs.task != 'regulation'
        run: pip install requests

      - name: Probe OpenRouter
        if: inputs.task != 'regulation'
        run: python scripts/scratch_test_openrouter.py ${{ inputs.task == 'usage' && '--usage' || '' }}

      # ---------------- regulation task ----------------

      - name: Install deps (regulation)
        if: inputs.task == 'regulation'
        run: pip install -r requirements.txt

      - name: Fetch SQLite snapshot from R2 (read-only — never uploaded back)
        if: inputs.task == 'regulation'
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          python - <<'PY'
          import gzip, shutil, pathlib
          from src.audit_reports import r2_storage
          gz, db = pathlib.Path("data/bddk_data.db.gz"), pathlib.Path("data/bddk_data.db")
          gz.parent.mkdir(parents=True, exist_ok=True)
          if not r2_storage.exists("state/bddk_data.db.gz"):
              raise SystemExit("No R2 snapshot — cannot run the regulation task.")
          size = r2_storage.download_to("state/bddk_data.db.gz", gz)
          print(f"Pulled state/bddk_data.db.gz from R2 ({size/1e6:.1f} MB)")
          with gzip.open(gz, "rb") as s, open(db, "wb") as d:
              shutil.copyfileobj(s, d)
          print(f"Decompressed to {db.stat().st_size/1e6:.1f} MB")
          PY

      - name: Regulation section via OpenRouter (DeepSeek)
        if: inputs.task == 'regulation'
        env:
          # The three env vars kimi.py already reads — repointed, not rewritten.
          KIMI_API_KEY: ${{ secrets.OPEN_ROUTER_API }}
          KIMI_API_URL: https://openrouter.ai/api/v1/chat/completions
          KIMI_MODEL: ${{ inputs.model_id != '' && inputs.model_id || 'deepseek/deepseek-v4-pro' }}
          # Post the bench output too, but labelled — it has the same shape as the
          # live weekly briefing and must never be mistaken for what /regulation shows.
          TELEGRAM_BOT_TOKEN: ${{ inputs.telegram && secrets.TELEGRAM_BOT_TOKEN || '' }}
          TELEGRAM_CHAT_ID: ${{ inputs.telegram && secrets.TELEGRAM_CHAT_ID || '' }}
          BRIEFING_LABEL: "🧪 BENCH — NOT the live briefing. /regulation is unchanged."
          # Pin the upstream. Baidu Qianfan: best latency (0.57s) AND best throughput
          # (73 tps) of all 18 endpoints, 100% uptime on both windows, fp8 not fp4,
          # ~4th cheapest — nothing trades off. allow_fallbacks stays false so a bad
          # name or an outage fails loudly instead of silently drawing another
          # provider, which is what made every earlier measurement noise.
          LLM_PROVIDER_ORDER: ${{ inputs.provider }}
          LLM_ALLOW_FALLBACKS: "false"
        run: |
          echo "== provider: OpenRouter / $KIMI_MODEL =="
          CAT='${{ inputs.category }}'
          if [ "$CAT" = "ALL" ]; then
            time python scripts/summarize_regulations.py --force
          else
            time python scripts/summarize_regulations.py --only-category "$CAT" --force
          fi
          python scripts/scratch_dump_briefing.py "OpenRouter / $KIMI_MODEL"

      - name: Same section on the incumbent (Kimi) for A/B
        if: inputs.task == 'regulation' && inputs.kimi_baseline
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ inputs.telegram && secrets.TELEGRAM_BOT_TOKEN || '' }}
          TELEGRAM_CHAT_ID: ${{ inputs.telegram && secrets.TELEGRAM_CHAT_ID || '' }}
          BRIEFING_LABEL: "🧪 BENCH (Kimi A/B) — NOT the live briefing."
        run: |
          echo "== provider: Kimi (incumbent) =="
          CAT='${{ inputs.category }}'
          if [ "$CAT" = "ALL" ]; then
            time python scripts/summarize_regulations.py --force
          else
            time python scripts/summarize_regulations.py --only-category "$CAT" --force
          fi
          python scripts/scratch_dump_briefing.py "Kimi (incumbent)"
