name: Test free models (manual, throwaway)

# Manual-only smoke test of the free LLM providers (Groq / Cerebras / Google)
# for the "The Read" headline rewrite. Keys live in repo secrets, so this can
# only run in CI. Delete this workflow + scripts/scratch_test_free_models.py
# once we've picked a model.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GIT_SHA: ${{ github.sha }}
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Run free-model evaluation
        run: python scripts/scratch_test_free_models.py

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: free-model-eval
          path: |
            free_model_eval.md
            free_model_eval.json
          if-no-files-found: warn
