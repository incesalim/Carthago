name: OCR spike (equity)

# THROWAWAY spike. Renders a sample of failing equity pages to images, OCRs them
# (RapidOCR = PP-OCR models on onnxruntime — the dev Windows box can't load the
# native ML libs, so this runs on Linux CI), feeds the OCR'd lines through the
# PRODUCTION parser, and counts how many NEWLY validate vs the text-layer reader.
# Go/no-go for a tier-2 OCR fallback on the failing pages. Manual only.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spike:
    name: Render → OCR → parse → validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (+ RapidOCR)
        run: pip install -r requirements.txt rapidocr-onnxruntime

      - name: Run OCR spike (pulls the audit DB snapshot from R2, then the table)
        run: python scripts/_spike_ocr.py
