version: 2
updates:
  # Python ingestion deps (requirements.txt at repo root)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      python-deps:
        patterns: ["*"]

  # Next.js dashboard deps
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      web-deps:
        patterns: ["*"]
    ignore:
      # eslint 10 is unsupported here: eslint-config-next 16 bundles
      # eslint-plugin-react 7.37.5, which requires ESLint <= 9.7. Keep eslint ^9.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  # Pin/refresh GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
